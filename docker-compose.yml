version: '3.9'

services:
  # 1. Database Utama (PostgreSQL - Bawaan Anda)
  db:
    image: postgres:15
    container_name: lms_db
    restart: always
    environment:
      POSTGRES_DB: lms_db
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Redis untuk Caching & Rate Limiting (Baru)
  redis:
    image: redis:7-alpine
    container_name: lms_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 3. MongoDB untuk Activity Logs (Baru)
  mongodb:
    image: mongo:7
    container_name: lms_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=mongo_pass
    volumes:
      - mongo_data:/data/db

  # 4. RabbitMQ sebagai Message Broker Celery (Baru)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: lms_rabbitmq
    restart: always
    ports:
      - "5672:5672"       # Port untuk worker
      - "15672:15672"     # Web dashboard panel RabbitMQ
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  # 5. Aplikasi Utama Django (Web - Diperbarui dependensinya)
  web:
    build: .
    container_name: lms_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - mongodb
      - rabbitmq
    env_file:
      - .env

  # 6. Celery Worker - Mengeksekusi Task Async (Baru)
  celery-worker:
    build: .
    container_name: lms_celery_worker
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - rabbitmq
      - db
    env_file:
      - .env

  # 7. Celery Beat - Scheduler Tugas Berkala (Baru)
  celery-beat:
    build: .
    container_name: lms_celery_beat
    command: celery -A config beat --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - rabbitmq
    env_file:
      - .env

  flower:
    image: mher/flower:latest
    container_name: lms_flower
    restart: always
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
    depends_on:
      - rabbitmq
      - redis

# ==========================================
# TAMBAHKAN BLOK INI DI BAGIAN PALING BAWAH:
# ==========================================
volumes:
  postgres_data:
  redis_data:
  mongo_data: